<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="format-detection" content="telephone=no">
  <title>TANOSHIKA 事業所診断</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-text-primary:   #333333;
      --c-text-secondary: #ffffff;
      --c-text-accent:    #096fc6;
      --c-text-muted:     #555555;
      --c-bg-dark:        #000000;
      --c-bg-light:       #f4f2f0;
      --c-white:          #ffffff;
      --ff: 'Overpass', 'Noto Sans JP', 'Yu Gothic', YuGothic, 'ヒラギノ角ゴ ProN W3', sans-serif;
      --fz-xs: 11px;
      --fz-sm: 12px;
      --fz-md: 13px;
      --fz-base: 14px;
      --fz-lg: 16px;
      --fz-xl: 17px;
      --fz-2xl: 19px;
      --sp-1: 5px;
      --sp-2: 9px;
      --sp-3: 10px;
      --sp-4: 12px;
      --sp-5: 15px;
      --sp-6: 18px;
      --sp-7: 20px;
      --sp-8: 22px;
      --r-xs: 5px;
      --r-sm: 19px;
      --r-md: 20px;
      --r-lg: 40px;
      --dur-fast: 400ms;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { height: 100%; }

    body {
      font-family: var(--ff);
      font-size: var(--fz-lg);
      color: var(--c-text-primary);
      background: var(--c-bg-light);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    /* ── Screen shell ── */
    .screen {
      display: none;
      flex-direction: column;
      min-height: 100vh;
    }
    .screen.is-active { display: flex; }
    .screen.anim-in  { animation: slideIn  var(--dur-fast) ease both; }
    .screen.anim-back { animation: slideBack var(--dur-fast) ease both; }

    @keyframes slideIn   { from { opacity:0; transform:translateX(24px);  } to { opacity:1; transform:translateX(0); } }
    @keyframes slideBack { from { opacity:0; transform:translateX(-24px); } to { opacity:1; transform:translateX(0); } }

    /* ── Container ── */
    .wrap {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* ── Buttons – base ── */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 54px;
      padding: 14px 20px;
      font-family: var(--ff);
      font-size: var(--fz-lg);
      font-weight: 600;
      border: none;
      border-radius: var(--r-lg);
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      line-height: 1.4;
      transition: opacity var(--dur-fast) ease, transform 120ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.98); }
    .btn:focus-visible { outline: 3px solid rgba(9,111,198,0.45); outline-offset: 3px; }

    .btn-primary   { background: var(--c-text-accent); color: var(--c-text-secondary); }
    .btn-primary:hover { opacity: 0.9; }

    .btn-outline   { background: var(--c-white); color: var(--c-text-accent); border: 2px solid var(--c-text-accent); }
    .btn-outline:hover { background: rgba(9,111,198,0.04); }

    /* ═══════════════════════════
       START SCREEN
    ═══════════════════════════ */
    #screen-start {
      background: linear-gradient(160deg, #deeeff 0%, #f5f9ff 45%, #ffffff 100%);
      color: var(--c-text-primary);
    }
    .start-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 44px 24px 32px;
    }
    .start-brand {
      font-size: var(--fz-xl);
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--c-text-accent);
      margin-bottom: 36px;
    }
    .start-headline {
      font-size: clamp(26px, 7.5vw, 38px);
      font-weight: 700;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: var(--c-text-primary);
      margin-bottom: 16px;
    }
    .start-headline em {
      font-style: normal;
      color: var(--c-text-accent);
    }
    .start-lead {
      font-size: var(--fz-base);
      color: var(--c-text-muted);
      line-height: 1.75;
      margin-bottom: 40px;
    }
    .start-chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
    }
    .start-chip {
      padding: 5px 12px;
      border: 1px solid rgba(9,111,198,0.28);
      border-radius: 100px;
      font-size: var(--fz-sm);
      color: var(--c-text-accent);
    }
    .start-note {
      padding: 20px 24px;
      font-size: var(--fz-sm);
      color: rgba(0,0,0,0.3);
      text-align: center;
      line-height: 1.65;
    }

    /* ═══════════════════════════
       QUESTION SCREEN
    ═══════════════════════════ */
    #screen-question { background: var(--c-bg-light); }

    .q-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--c-bg-light);
      padding: var(--sp-4) 16px 0;
    }
    .q-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-4);
      min-height: 44px;
    }
    .btn-back {
      display: flex;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      font-family: var(--ff);
      font-size: var(--fz-md);
      color: var(--c-text-muted);
      cursor: pointer;
      padding: 8px 4px;
      border-radius: var(--r-xs);
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:focus-visible { outline: 2px solid var(--c-text-accent); outline-offset: 2px; }
    .btn-back.is-hidden { visibility: hidden; pointer-events: none; }
    .btn-back svg { width: 15px; height: 15px; flex-shrink: 0; }

    .q-progress-label {
      font-size: var(--fz-sm);
      color: var(--c-text-muted);
    }
    .progress-track {
      height: 3px;
      background: rgba(0,0,0,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: var(--c-text-accent);
      border-radius: 2px;
      transition: width 500ms ease;
    }

    .q-body {
      flex: 1;
      padding: 24px 16px 40px;
      display: flex;
      flex-direction: column;
    }
    .q-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      background: var(--c-bg-dark);
      color: var(--c-text-secondary);
      font-size: var(--fz-xs);
      font-weight: 700;
      letter-spacing: 0.08em;
      border-radius: var(--r-xs);
      margin-bottom: 12px;
      width: fit-content;
    }
    .q-text {
      font-size: var(--fz-2xl);
      font-weight: 700;
      line-height: 1.55;
      margin-bottom: 28px;
    }

    .options { display: flex; flex-direction: column; gap: 10px; }

    .opt-btn {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 56px;
      padding: 14px 18px;
      background: var(--c-white);
      border: 2px solid transparent;
      border-radius: var(--r-md);
      font-family: var(--ff);
      font-size: var(--fz-lg);
      color: var(--c-text-primary);
      cursor: pointer;
      text-align: left;
      line-height: 1.5;
      transition: border-color var(--dur-fast) ease, background var(--dur-fast) ease, transform 100ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .opt-btn:hover { border-color: var(--c-text-accent); background: rgba(9,111,198,0.03); }
    .opt-btn:active { transform: scale(0.99); }
    .opt-btn:focus-visible { outline: none; border-color: var(--c-text-accent); box-shadow: 0 0 0 3px rgba(9,111,198,0.18); }
    .opt-btn.is-selected { border-color: var(--c-text-accent); background: rgba(9,111,198,0.05); }

    .opt-radio {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #cccccc;
      margin-right: 12px;
      transition: border-color var(--dur-fast) ease, background var(--dur-fast) ease;
      position: relative;
    }
    .opt-btn:hover .opt-radio,
    .opt-btn.is-selected .opt-radio { border-color: var(--c-text-accent); }
    .opt-btn.is-selected .opt-radio::after {
      content: '';
      position: absolute;
      inset: 3px;
      background: var(--c-text-accent);
      border-radius: 50%;
    }

    /* ═══════════════════════════
       RESULT SCREEN
    ═══════════════════════════ */
    #screen-result { background: var(--c-bg-light); }

    .result-head {
      padding: 44px 24px 32px;
      text-align: center;
    }
    .result-badge {
      display: inline-block;
      padding: 5px 16px;
      border-radius: var(--r-lg);
      font-size: var(--fz-xs);
      font-weight: 700;
      letter-spacing: 0.12em;
      margin-bottom: 20px;
    }
    .result-eyebrow {
      font-size: var(--fz-sm);
      color: var(--c-text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }
    .result-name {
      font-size: clamp(22px, 6.5vw, 30px);
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 8px;
    }
    .result-tagline {
      font-size: var(--fz-base);
      color: var(--c-text-muted);
      line-height: 1.6;
    }

    .result-body { padding: 0 16px 16px; }
    .result-card {
      background: var(--c-white);
      border-radius: var(--r-md);
      padding: 22px;
    }
    .result-card-label {
      font-size: var(--fz-sm);
      font-weight: 600;
      color: var(--c-text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .result-desc {
      font-size: var(--fz-base);
      line-height: 1.8;
    }

    .result-ctas {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-retry {
      background: none;
      border: none;
      font-family: var(--ff);
      font-size: var(--fz-md);
      color: var(--c-text-muted);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      padding: 12px;
      width: 100%;
      text-align: center;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-retry:focus-visible { outline: 2px solid var(--c-text-accent); outline-offset: 2px; border-radius: var(--r-xs); }

    /* Result themes */
    .t-farm   .result-badge { background: #1a7a3e; color: #fff; }
    .t-farm   .result-name  { color: #1a7a3e; }
    .t-plus   .result-badge { background: #d15300; color: #fff; }
    .t-plus   .result-name  { color: #d15300; }
    .t-create .result-badge { background: var(--c-text-accent); color: #fff; }
    .t-create .result-name  { color: var(--c-text-accent); }
    .t-btype  .result-badge { background: #555; color: #fff; }
    .t-btype  .result-name  { color: #333; }

    /* ── Util ── */
    .sr-only {
      position: absolute; width:1px; height:1px; padding:0; margin:-1px;
      overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
    }

    .start-hero-img {
      width: 100%;
      overflow: hidden;
      flex-shrink: 0;
    }
    .start-hero-img img {
      width: 100%;
      height: 210px;
      object-fit: cover;
      object-position: center 42%;
      display: block;
    }
  </style>
</head>

    opts: [

const RESULTS = {
  result_farm: {

    desc: 'TANOSHIKA PLUSは清掃事業と販売事業の2軸で働くA型事業所です。施設内外での清掃作業や、事務・入力業務を通じて、生活リズムを整えながら、着実に一般就労を目指します。',
    ctas: [
      { text: '見学・お問い合わせ',       url: 'https://tanoshika.jp/contact/', primary: true  },
      { text: 'どちらか悩んでいる方はこちら', url: 'https://tanoshika.jp/contact/', primary: false },

  result_creative: {
    theme: 't-create',
    badge: 'CREATIVE',
    eyebrow: 'あなたにおすすめの事業所',
    name: 'TANOSHIKA CREATIVE',
    tagline: 'PC作業特化のA型事業所',
    desc: 'TANOSHIKA CREATIVEはPC作業に特化したA型事業所です。Webデザイン・コーディング・ライティング・データ入力などを、実際の仕事を通じてスキルを身につけます。テレワークと通勤を柔軟に組み合わせながら、一般就労を目指します。',
    ctas: [
      { text: '諏訪野町への見学・お問い合わせ', url: 'https://tanoshika.jp/contact/', primary: true  },
      { text: '東町への見学・お問い合わせ',     url: 'https://tanoshika.jp/contact/', primary: true  },
      { text: 'どちらか悩んでいる方はこちら',   url: 'https://tanoshika.jp/contact/', primary: false },

  result_btype: {
    theme: 't-btype',
    badge: 'サポート',
    eyebrow: 'あなたへのご提案',
    name: 'まずは相談から',
    tagline: '今すぐA型でなくていい',
    desc: '今すぐA型でなくても、あなたに合ったステップがあります。まずは気軽に相談してみましょう。TANOSHIKAのサポートスタッフが、あなたに合った働き方をいっしょに考えます。',

// ── State ─────────────────────────────────────────────────────────

let history   = [];
let animating = false;

// ── Core ──────────────────────────────────────────────────────────

function startDiagnosis() {
  history = [];
  renderQuestion('q1');
  activate('screen-question', false);
}

function renderQuestion(id) {
  const q = QUESTIONS[id];
  history.push(id);

  // back button
  const btnBack = document.getElementById('btn-back');
  history.length > 1 ? btnBack.classList.remove('is-hidden') : btnBack.classList.add('is-hidden');

  // progress
  const pct = Math.round((q.step / q.totalSteps) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-bar-wrap').setAttribute('aria-valuenow', pct);
  document.getElementById('progress-label').textContent = q.step + ' / ' + q.totalSteps;

  // question
  document.getElementById('q-badge').textContent = q.label;
  document.getElementById('q-text').textContent  = q.text;

  // options
  const container = document.getElementById('options');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.setAttribute('role', 'radio');
    btn.setAttribute('aria-checked', 'false');
    btn.setAttribute('tabindex', i === 0 ? '0' : '-1');
    btn.innerHTML =
      '<span class="opt-radio" aria-hidden="true"></span>' +
      '<span>' + esc(opt.text) + '</span>';
    btn.addEventListener('click',   ()  => pick(btn, opt.next, container));
    btn.addEventListener('keydown', (e) => arrowNav(e, i, q.opts.length, container));
    container.appendChild(btn);
  });

  setTimeout(() => {
    const first = container.querySelector('.opt-btn');
    if (first) first.focus();
  }, 350);
}

function pick(btn, next, container) {
  if (animating) return;
  container.querySelectorAll('.opt-btn').forEach(b => {
    b.classList.remove('is-selected');
    b.setAttribute('aria-checked', 'false');
  });
  btn.classList.add('is-selected');
  btn.setAttribute('aria-checked', 'true');

  setTimeout(() => {
    if (next.startsWith('result_')) showResult(next);
    else { renderQuestion(next); }
  }, 220);
}

function goBack() {
  if (animating || history.length <= 1) return;
  history.pop();
  const prev = history.pop();
  if (!prev) {
    activate('screen-start', true);
    history = [];
    return;
  }
  renderQuestion(prev);
  activate('screen-question', true);
}

function showResult(id) {
  const r = RESULTS[id];
  const wrap = document.getElementById('result-wrap');

  const ctaHtml = r.ctas.map(c =>
    `<a href="${esc(c.url)}" class="btn ${c.primary ? 'btn-primary' : 'btn-outline'}" target="_blank" rel="noopener noreferrer">${esc(c.text)}</a>`
  ).join('');

  wrap.innerHTML = `
    <header class="result-head ${esc(r.theme)}">
      <div class="result-badge">${esc(r.badge)}</div>
      <p class="result-eyebrow">${esc(r.eyebrow)}</p>
      <h2 class="result-name">${esc(r.name)}</h2>
      <p class="result-tagline">${esc(r.tagline)}</p>
    </header>
    <div class="result-body">
      <div class="result-card">
        <p class="result-card-label">事業所のご紹介</p>
        <p class="result-desc">${esc(r.desc)}</p>
      </div>
    </div>
    <div class="result-ctas">
      ${ctaHtml}
      <button class="btn-retry" onclick="restart()">もう一度診断する</button>
    </div>
  `;

  activate('screen-result', false);
}

function restart() {
  history = [];
  activate('screen-start', true);
}

// ── Helpers ───────────────────────────────────────────────────────

function activate(id, isBack) {
  if (animating) return;
  animating = true;

  const cls = isBack ? 'anim-back' : 'anim-in';
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('is-active', 'anim-in', 'anim-back');
  });
  const target = document.getElementById(id);
  target.classList.add('is-active', cls);

  window.scrollTo(0, 0);
  setTimeout(() => {
    target.classList.remove(cls);
    animating = false;
  }, 400);
}

function arrowNav(e, idx, total, container) {
  const btns = container.querySelectorAll('.opt-btn');
  let next = -1;
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); next = (idx + 1) % total; }
  if (e.key === 'ArrowUp'   || e.key === 'ArrowLeft')  { e.preventDefault(); next = (idx - 1 + total) % total; }
  if (next >= 0) {
    btns[idx].setAttribute('tabindex', '-1');
    btns[next].setAttribute('tabindex', '0');
    btns[next].focus();
  }
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
